global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "bridge"
    scrape_interval: 1s
    static_configs:
      - targets: ["bridge:8001"]

  - job_name: "poller"
    static_configs:
      - targets: ["poller:8000"]

  - job_name: "flink"
    scrape_interval: 5s
    static_configs:
      - targets: ["taskmanager:9249"]

  - job_name: "replay"
    scrape_interval: 5s
    static_configs:
      - targets: ["replay:8002"]

  - job_name: "lancer"
    scrape_interval: 5s
    static_configs:
      - targets: ["lancer:8004"]

  - job_name: "analyst"
    scrape_interval: 15s
    static_configs:
      - targets: ["172.17.0.1:8006"]

  - job_name: "consensus"
    scrape_interval: 10s
    static_configs:
      - targets: ["172.17.0.1:8008"]
